<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>

<title>Data Peserta Jamaah</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =========================
   GLOBAL
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f1f5f9;
    padding:12px;
    padding-bottom:120px;
    color:#111827;
}

/* =========================
   HEADER
========================= */

.header{
    margin-bottom:16px;
}

.header h1{
    font-size:24px;
    font-weight:700;
    margin-bottom:14px;
    line-height:1.3;
}

/* =========================
   SEARCH BOX
========================= */

.search-box{
    width:100%;
}

.search-box input{
    width:100%;
    padding:15px 16px;
    border:none;
    border-radius:18px;
    font-size:14px;
    outline:none;
    background:#ffffff;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
    transition:0.3s;
}

.search-box input:focus{
    box-shadow:0 5px 25px rgba(37,99,235,0.20);
}

/* =========================
   TABLE
========================= */

.table-container{
    width:100%;
    overflow-x:auto;
    overflow-y:auto;
    background:#ffffff;
    border-radius:22px;
    box-shadow:0 8px 30px rgba(0,0,0,0.08);
    -webkit-overflow-scrolling:touch;
    padding-bottom:30px; /* tambahkan ini */
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:2200px;
    margin-bottom:10px;
}

/* =========================
   STICKY HEADER
========================= */

thead th{
    background:#111827;
    color:#ffffff;
    position:sticky;
    top:0;
    z-index:20;
}

th{
    padding:15px 14px;
    text-align:left;
    font-size:13px;
    font-weight:600;
    white-space:nowrap;
}

td{
    padding:14px;
    border-bottom:1px solid #e5e7eb;
    font-size:13px;
    vertical-align:middle;
    white-space:nowrap;
}

tbody tr{
    transition:0.2s;
}

tbody tr:hover{
    background:#f8fafc;
}

/* =========================
   FOTO
========================= */

.photo{
    width:60px;
    height:60px;
    border-radius:12px;
    object-fit:cover;
    border:2px solid #e5e7eb;
}

/* =========================
   BUTTON FILE
========================= */

.file-btn{
    display:inline-block;
    padding:7px 12px;
    border-radius:10px;
    background:#2563eb;
    color:#ffffff;
    text-decoration:none;
    font-size:11px;
    font-weight:600;
    transition:0.3s;
}

.file-btn:hover{
    background:#1d4ed8;
}

/* =========================
   STATUS
========================= */

.status{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    font-size:11px;
    font-weight:600;
}

.active{
    background:#22c55e;
    color:#ffffff;
}

.pending{
    background:#facc15;
    color:#111827;
}

.nonactive{
    background:#ef4444;
    color:#ffffff;
}

/* =========================
   FLOATING CARD
========================= */

.floating-card{
    position:fixed;
    right:12px;
    bottom:12px;
    left:auto;
    background:#111827;
    color:#ffffff;
    padding:14px 18px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.20);
    z-index:999;
    animation:fadeIn 0.5s ease;
    backdrop-filter:blur(8px);
    width:auto;
    min-width:170px;
    max-width:220px;
}

.floating-card h3{
    font-size:12px;
    font-weight:500;
    margin-bottom:4px;
    opacity:0.9;
}

.floating-card h2{
    font-size:20px;
    font-weight:700;
    line-height:1.2;
    word-break:break-word;
}

/* =========================
   LOADING
========================= */

.loading{
    padding:35px;
    text-align:center;
    font-size:14px;
}

/* =========================
   SCROLLBAR
========================= */

.table-container::-webkit-scrollbar{
    height:6px;
}

.table-container::-webkit-scrollbar-thumb{
    background:#cbd5e1;
    border-radius:20px;
}

/* =========================
   ANIMATION
========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* =========================
   DESKTOP
========================= */

@media(min-width:769px){

    body{
        padding:20px;
        padding-bottom:140px;
    }

    .header h1{
        font-size:20px;
    }

    .search-box input{
        padding:16px 20px;
        font-size:10px;
    }

    th{
        padding:16px;
        font-size:10px;
    }

    td{
        padding:14px 16px;
        font-size:10px;
    }

    .photo{
        width:70px;
        height:70px;
    }

    .file-btn{
        padding:8px 14px;
        font-size:10px;
    }

    .status{
        padding:8px 14px;
        font-size:10px;
    }

    .floating-card{
        right:20px;
        bottom:20px;
        padding:16px 20px;
        border-radius:20px;
        min-width:190px;
        max-width:240px;
    }

    .floating-card h2{
        font-size:20px;
    }

}

/* =========================
   MOBILE EXTRA
========================= */

@media(max-width:480px){

    body{
        padding:10px;
        padding-bottom:120px;
    }

    .header h1{
        font-size:20px;
    }

    .search-box input{
        padding:14px 15px;
        font-size:10px;
        border-radius:16px;
    }

    th{
        font-size:10px;
        padding:13px;
    }

    td{
        font-size:10px;
        padding:13px;
    }

    .photo{
        width:55px;
        height:55px;
    }

    .file-btn{
        font-size:10px;
        padding:6px 10px;
    }

    .status{
        font-size:10px;
        padding:6px 10px;
    }

    .floating-card{
        right:10px;
        bottom:10px;
        padding:12px 14px;
        min-width:150px;
        max-width:180px;
        border-radius:16px;
    }

    .floating-card h2{
        font-size:17px;
    }

}

</style>
</head>

<body>

<div class="header">

    <h1>Data Peserta Jamaah</h1>

    <div class="search-box">

        <input 
            type="text"
            id="searchInput"
            placeholder="Cari nama, paspor, NIK, whatsapp, status, ID jamaah..."
        >

    </div>

</div>

<div class="table-container">

    <table>

        <thead>

            <tr>

                <th>Upload Foto</th>
                <th>Nama Lengkap</th>
                <th>Status SISKOPATUH</th>
                <th>ID Jamaah</th>
                <th>No Paspor</th>
                <th>Masa Berlaku Paspor</th>
                <th>Status Paspor</th>
                <th>NIK</th>
                <th>Riwayat Penyakit</th>
                <th>No WhatsApp</th>
                <th>Kontak Darurat</th>
                <th>Hubungan</th>
                <th>No Darurat</th>
                <th>Upload Paspor</th>
                <th>Upload KTP</th>
                <th>Tgl. Input</th>

            </tr>

        </thead>

        <tbody id="tableBody">

            <tr>
                <td colspan="16" class="loading">
                    Memuat data...
                </td>
            </tr>

        </tbody>

    </table>

</div>

<div class="floating-card">

    <h3>Jumlah Peserta</h3>

    <h2 id="jumlahPeserta">
        0
    </h2>

</div>

<script>

/* =========================================
   GOOGLE SHEET
========================================= */

const sheetURL =
'https://docs.google.com/spreadsheets/d/1WB7xv6kI29xmeJh-iht_emcJr3ul-Wh0fWZ3T6guMok/gviz/tq?tqx=out:json&gid=424839537';

let allData = [];

/* =========================================
   FORMAT TANGGAL
========================================= */

function formatTanggal(value){

    if(!value) return '';

    const match = value.match(/Date\((\d+),(\d+),(\d+)\)/);

    if(match){

        const year  = parseInt(match[1]);
        const month = parseInt(match[2]) + 1;
        const day   = parseInt(match[3]);

        const dd = String(day).padStart(2,'0');
        const mm = String(month).padStart(2,'0');

        return `${dd}/${mm}/${year}`;

    }

    return value;

}

/* =========================================
   CONVERT GOOGLE DRIVE LINK
========================================= */

function convertDriveLink(url){

    if(!url) return '';

    const match = url.match(/[-\w]{25,}/);

    if(match){

        return `https://drive.google.com/thumbnail?id=${match[0]}&sz=w1000`;

    }

    return url;

}

/* =========================================
   LOAD DATA
========================================= */

async function loadData(){

    try{

        const response = await fetch(sheetURL);

        const text = await response.text();

        const json = JSON.parse(
            text.substring(47).slice(0,-2)
        );

        const rows = json.table.rows;

        allData = rows.map(row => {

            const c = row.c;

            return {

                foto           : c[0]?.v || '',
                nama           : c[1]?.v || '',
                status         : c[2]?.v || '',
                idjamaah       : c[3]?.v || '',
                paspor         : c[4]?.v || '',
                berlaku        : formatTanggal(c[5]?.f || c[5]?.v || ''),
                statuspaspor   : c[6]?.v || '',
                nik            : c[7]?.v || '',
                penyakit       : c[8]?.v || '',
                whatsapp       : c[9]?.v || '',
                kontak         : c[10]?.v || '',
                hubungan       : c[11]?.v || '',
                nodarurat      : c[12]?.v || '',
                uploadpaspor   : c[13]?.v || '',
                uploadktp      : c[14]?.v || '',
                tglinput       : formatTanggal(c[15]?.f || c[15]?.v || '')

            };

        });

        renderTable(allData);

    }catch(error){

        document.getElementById('tableBody').innerHTML = `
            <tr>
                <td colspan="16" class="loading">
                    Gagal mengambil data
                </td>
            </tr>
        `;

        console.log(error);

    }

}

/* =========================================
   RENDER TABLE
========================================= */

function renderTable(data){

    const tableBody =
        document.getElementById('tableBody');

    if(data.length === 0){

        tableBody.innerHTML = `
            <tr>
                <td colspan="16" class="loading">
                    Data tidak ditemukan
                </td>
            </tr>
        `;

        updateTotal(0);

        return;

    }

    let html = '';

    data.forEach(item => {

        let statusClass = 'pending';

        const status =
            item.status.toString().toLowerCase();

        if(
            status.includes('aktif') ||
            status.includes('approved')
        ){

            statusClass = 'active';

        }else if(
            status.includes('nonaktif') ||
            status.includes('reject')
        ){

            statusClass = 'nonactive';

        }

        html += `

        <tr>

            <td>
                <img 
                    src="${convertDriveLink(item.foto)}"
                    class="photo"
                    onerror="this.src='https://via.placeholder.com/70x70?text=Foto'"
                >
            </td>

            <td>${item.nama}</td>

            <td>
                <span class="status ${statusClass}">
                    ${item.status}
                </span>
            </td>

            <td>${item.idjamaah}</td>

            <td>${item.paspor}</td>

            <td>${item.berlaku}</td>

            <td>${item.statuspaspor}</td>

            <td>${item.nik}</td>

            <td>${item.penyakit}</td>

            <td>${item.whatsapp}</td>

            <td>${item.kontak}</td>

            <td>${item.hubungan}</td>

            <td>${item.nodarurat}</td>

            <td>
                <a 
                    href="${item.uploadpaspor}" 
                    target="_blank"
                    class="file-btn"
                >
                    Lihat File
                </a>
            </td>

            <td>
                <a 
                    href="${item.uploadktp}" 
                    target="_blank"
                    class="file-btn"
                >
                    Lihat File
                </a>
            </td>

            <td>${item.tglinput}</td>

        </tr>

        `;

    });

    tableBody.innerHTML = html;

    updateTotal(data.length);

}

/* =========================================
   UPDATE TOTAL
========================================= */

function updateTotal(total){

    document.getElementById('jumlahPeserta')
    .innerHTML = total;

}

/* =========================================
   SEARCH
========================================= */

document
.getElementById('searchInput')
.addEventListener('keyup', function(){

    const keyword =
        this.value.toLowerCase();

    const filtered = allData.filter(item => {

        return (

            item.nama.toString().toLowerCase().includes(keyword) ||
            item.status.toString().toLowerCase().includes(keyword) ||
            item.idjamaah.toString().toLowerCase().includes(keyword) ||
            item.paspor.toString().toLowerCase().includes(keyword) ||
            item.nik.toString().toLowerCase().includes(keyword) ||
            item.whatsapp.toString().toLowerCase().includes(keyword) ||
            item.kontak.toString().toLowerCase().includes(keyword) ||
            item.hubungan.toString().toLowerCase().includes(keyword) ||
            item.nodarurat.toString().toLowerCase().includes(keyword)

        );

    });

    renderTable(filtered);

});

/* =========================================
   LOAD AWAL
========================================= */

loadData();

</script>

</body>
</html>
